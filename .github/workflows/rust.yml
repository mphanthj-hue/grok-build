name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTC_WRAPPER: ""

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -q && sudo apt-get install -y binutils mold 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -q && sudo apt-get install -y binutils mold 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: clippy
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy-x86_64"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: cargo clippy
        run: cargo clippy --all-targets --workspace

  test:
    name: Test (x86_64)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -q && sudo apt-get install -y binutils mold 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-x86_64"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest run
        run: cargo nextest run --workspace --locked --no-fail-fast
      - name: cargo test --doc
        run: cargo test --doc --workspace --locked

  cross-check:
    name: Cross-check (aarch64)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: aarch64-unknown-linux-gnu
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "check-aarch64"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cross-compilation tools
        run: sudo apt-get update -q && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: cargo check (aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --workspace --locked --target aarch64-unknown-linux-gnu

  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [clippy, test, cross-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"
      - name: Install cross-linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update -q && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build (release-dist)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --profile release-dist --locked --target ${{ matrix.target }} -p xai-grok-pager
      - name: Extract debug symbols (Linux)
        if: runner.os == 'Linux'
        run: |
          objcopy --only-keep-debug \
            target/${{ matrix.target }}/release-dist/xai-grok-pager \
            target/${{ matrix.target }}/release-dist/xai-grok-pager.debug
          strip --strip-debug \
            target/${{ matrix.target }}/release-dist/xai-grok-pager
      - uses: actions/upload-artifact@v4
        with:
          name: grok-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release-dist/xai-grok-pager
            target/${{ matrix.target }}/release-dist/xai-grok-pager.debug

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
